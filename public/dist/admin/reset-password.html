<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-overlay" style="display:flex;">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <h2>إعادة تعيين كلمة المرور</h2>
                <p>اختر كلمة مرور قوية من 12 حرفاً على الأقل.</p>
            </div>
            <form id="reset-form">
                <div class="form-group">
                    <label for="new-password">كلمة المرور الجديدة</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="new-password" minlength="12" required autocomplete="new-password">
                        <i class="fa-solid fa-eye password-toggle-icon" onclick="togglePasswordVisibility('new-password', this)"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm-password">تأكيد كلمة المرور</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="confirm-password" minlength="12" required autocomplete="new-password">
                        <i class="fa-solid fa-eye password-toggle-icon" onclick="togglePasswordVisibility('confirm-password', this)"></i>
                    </div>
                </div>
                <p id="reset-message" role="alert" style="display:none; margin-bottom:1rem;"></p>
                <button type="submit" class="btn btn-primary" style="width:100%;">حفظ كلمة المرور</button>
            </form>
        </div>
    </div>
    <script>
        function togglePasswordVisibility(inputId, iconEl) {
            const input = document.getElementById(inputId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                iconEl.classList.remove('fa-eye');
                iconEl.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                iconEl.classList.remove('fa-eye-slash');
                iconEl.classList.add('fa-eye');
            }
        }

        function getCookie(name) {
            const match = document.cookie.split('; ').find(row => row.startsWith(name + '='));
            return match ? decodeURIComponent(match.split('=').slice(1).join('=')) : '';
        }

        document.getElementById('reset-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const message = document.getElementById('reset-message');
            const newPassword = document.getElementById('new-password').value;
            const confirmation = document.getElementById('confirm-password').value;
            const token = new URLSearchParams(window.location.search).get('token');

            message.style.display = 'block';
            if (!token) {
                message.textContent = 'رابط الاستعادة غير صحيح.';
                return;
            }
            if (newPassword !== confirmation) {
                message.textContent = 'كلمتا المرور غير متطابقتين.';
                return;
            }

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCookie('XSRF-TOKEN')
                    },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await response.json();
                if (!response.ok || !data.success) throw new Error(data.message || 'تعذر تحديث كلمة المرور.');
                message.textContent = 'تم تحديث كلمة المرور. سيتم نقلك إلى تسجيل الدخول.';
                setTimeout(() => window.location.href = '/admin/', 1800);
            } catch (error) {
                message.textContent = error.message;
            }
        });
    </script>
</body>
</html>
