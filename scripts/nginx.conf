# Nginx Configuration for Dr. Saud bin Fahd Al-Duraymih Law Office
# Place this configuration in /etc/nginx/sites-available/draymih-law-office

server {
    listen 80;
    listen [::]:80;
    server_name alduraymih-law.sa www.alduraymih-law.sa;

    # SSL configuration templates (uncomment when Certificates are set up via Certbot)
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/alduraymih-law.sa/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/alduraymih-law.sa/privkey.pem;

    # Enforce request upload sizes (matching Node.js limits)
    client_max_body_size 35M;

    # Enable Gzip compression for faster page delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # CSP aligned with Helmet backend configurations
    add_header Content-Security-Policy "default-src 'self' https: http:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://*.tinymce.com https://cdn.tiny.cloud; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://*.tinymce.com https://cdn.tiny.cloud https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data: https://cdn.jsdelivr.net; img-src 'self' data: https: blob: https://*.tinymce.com https://cdn.tiny.cloud https://cdn.jsdelivr.net;" always;

    # Node.js backend reverse proxy mapping (including WebSocket upgrade support)
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets long-term caching optimizer
    location /assets/ {
        root /home/deploy/draymih-law-office/public;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Serve blog media assets statically via Nginx
    location /storage/blog/ {
        root /home/deploy/draymih-law-office;
        expires 15d;
        add_header Cache-Control "public, no-transform";
        location ~* \.(php|pl|py|jsp|sh|cgi)$ {
            deny all;
        }
    }

    # Block direct client download access to raw consultation file uploads (must stream via API)
    location /storage/uploads/ {
        deny all;
    }
}
